# configs/kind-config.yaml
# kind cluster configuration for a local Crossplane environment.
#
# Layout: 1 control-plane + 2 worker nodes.
# Adjust worker node count or resource limits to match your machine.
#
# Override at runtime:
#   KIND_CONFIG_PATH=/path/to/my-config.yaml ./setup.sh

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

# Cluster name is controlled by --name in cluster.sh (default: crossplane-local)

nodes:
  # ── Control plane ──────────────────────────────────────────────────────────
  - role: control-plane
    kubeadmConfigPatches:
      # Give the control-plane node extra time to pull images on slow networks
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Expose port 80/443 if you add an ingress controller later
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP

  # ── Worker nodes ───────────────────────────────────────────────────────────
  - role: worker
  - role: worker

# Feature gates — enable server-side apply (required by Crossplane ≥ 1.14)
featureGates:
  ServerSideApply: true

# Networking defaults — override only if you need custom pod/service CIDRs
networking:
  # podSubnet: "10.244.0.0/16"
  # serviceSubnet: "10.96.0.0/12"
  disableDefaultCNI: false
